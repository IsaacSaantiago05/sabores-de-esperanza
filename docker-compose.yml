version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sabores-postgres
    environment:
      POSTGRES_USER: sabores
      POSTGRES_PASSWORD: esperanza2024
      POSTGRES_DB: sabores_db
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sabores-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sabores"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sabores-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sabores-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sabores-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@saboresdeesperanza.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - sabores-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sabores-network:
    driver: bridge
